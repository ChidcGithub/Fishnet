name: Flutter Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/fishnet.apk

      - name: Rename AAB
        run: mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/fishnet.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fishnet-apk
          path: build/app/outputs/flutter-apk/fishnet.apk

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: fishnet-aab
          path: build/app/outputs/bundle/release/fishnet.aab

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## 🎣 Fishnet - Error Testing App
            
            A Flutter application for triggering various types of errors and viewing detailed crash reports.
            
            ### ✨ Features
            - **8 Error Categories**: Null, Type, Range, State, Network, Logic, Async, Custom Errors
            - **60+ Error Types**: Comprehensive collection of common Dart/Flutter errors
            - **Thread System**: 10 worker threads (Alpha-Juliet) with unique roles
            - **Thread Last Words**: 160+ dramatic English phrases for terminated threads
            - **Detailed Crash Reports**: APK info, device info, stack traces, thread info
            - **Material Design 3**: Modern UI with light/dark theme support
            - **Error History**: Persistent storage of crash records
            - **Export Reports**: Copy full crash reports to clipboard
            
            ### 📱 Downloads
            | File | Description |
            |------|-------------|
            | `fishnet.apk` | Android APK for direct installation |
            | `fishnet.aab` | Android App Bundle for Google Play |
            
            ### 🧵 Thread Roles
            1. Alpha - UI Renderer
            2. Bravo - Network Handler
            3. Charlie - Database Worker
            4. Delta - File Manager
            5. Echo - Cache Controller
            6. Foxtrot - Event Dispatcher
            7. Golf - Task Scheduler
            8. Hotel - Memory Monitor
            9. India - Log Collector
            10. Juliet - Backup Agent
            
            ### 📝 Commit
            Built from: ${{ github.sha }}
            
            ### 📜 License
            Apache 2.0
          files: |
            build/app/outputs/flutter-apk/fishnet.apk
            build/app/outputs/bundle/release/fishnet.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
